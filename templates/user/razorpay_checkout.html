{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 120px; height: 120px; animation: spin 2s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 18px; color: #333; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Redirecting to payment gateway...</p>

    <script>
        var options = {
            "key": "{{ razorpay_key_id }}",
            "amount": "{{ order.amount }}",
            "currency": "{{ order.currency }}",
            "name": "Doctor Appointment System",
            "description": "Appointment Booking",
            "order_id": "{{ order.id }}",
            "handler": function (response){
                // Submit form to callback URL
                var form = document.createElement("form");
                form.method = "POST";
                form.action = "{{ callback_url }}";
                
                var csrf = document.createElement("input");
                csrf.type = "hidden";
                csrf.name = "csrfmiddlewaretoken";
                csrf.value = "{{ csrf_token }}";
                form.appendChild(csrf);
                
                var fields = {
                    razorpay_payment_id: response.razorpay_payment_id,
                    razorpay_order_id: response.razorpay_order_id,
                    razorpay_signature: response.razorpay_signature
                };
                for (var key in fields) {
                    var input = document.createElement("input");
                    input.type = "hidden";
                    input.name = key;
                    input.value = fields[key];
                    form.appendChild(input);
                }
                document.body.appendChild(form);
                form.submit();
            },
            "modal": {
                "ondismiss": function(){
                    window.location.href = "{% url 'appointment' %}";
                }
            }
        };
        var rzp = new Razorpay(options);
        rzp.open();
    </script>
</body>
</html>
